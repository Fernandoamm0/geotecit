<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Ejecutivo GeotecIT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Tarjetas */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
        .card h3 { margin: 0; font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .card .value { font-size: 28px; font-weight: bold; margin: 5px 0; color: #38bdf8; }

        /* Gráficas */
        .grid-charts { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-charts-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        h4 { margin: 0 0 15px 0; font-size: 14px; color: #cbd5e1; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 5px; }

        .loading { text-align: center; font-size: 20px; color: #38bdf8; margin-top: 100px; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://geotecit.com/wp-content/uploads/2020/09/Geoteicit_Logo_baja_digital.png" width="160">
    <h2 style="margin:0;">Dashboard Inteligente de Laboratorio</h2>
    <div id="fechaReloj"></div>
</div>

<div id="espera" class="loading">Procesando métricas de rendimiento...</div>

<div id="contenido" style="display: none;">
    <div class="grid-stats">
        <div class="card"><h3>Total Ingresos</h3><div class="value" id="vTotal">0</div></div>
        <div class="card"><h3>En Diagnóstico</h3><div class="value" id="vPend" style="color: #f59e0b;">0</div></div>
        <div class="card"><h3>Producción Total</h3><div class="value" id="vRep" style="color: #10b981;">0</div></div>
        <div class="card"><h3>Módulos en Scrap</h3><div class="value" id="vScrap" style="color: #ef4444;">0</div></div>
        <div class="card"><h3>Eficiencia QA</h3><div class="value" id="vQA" style="color: #8b5cf6;">0%</div></div>
    </div>

    <div class="grid-charts">
        <div class="chart-box">
            <h4>Tendencia Diaria (Entradas vs Salidas)</h4>
            <canvas id="chartTendencia"></canvas>
        </div>
        <div class="chart-box">
            <h4>Ranking de IDC (Quién envía más)</h4>
            <canvas id="chartIDC"></canvas>
        </div>
    </div>

    <div class="grid-charts-bottom">
        <div class="chart-box">
            <h4>Productividad por Técnico</h4>
            <canvas id="chartTecnicos"></canvas>
        </div>
        <div class="chart-box">
            <h4>Mix de Marcas</h4>
            <canvas id="chartMarcas"></canvas>
        </div>
    </div>
</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxdMUWvzZyODYozjCd8DQ2tZP7MfAWYwOXtDe2ldtrznmwMYE30mqaqwXLlzrvKrr6p/exec";

async function cargarData() {
    try {
        const res = await fetch(URL_SCRIPT);
        const json = await res.json();
        const s = json.stats;

        // Llenar Tarjetas
        document.getElementById("vTotal").innerText = s.total;
        document.getElementById("vPend").innerText = s.pendientes;
        document.getElementById("vRep").innerText = s.reparados + s.liberados;
        document.getElementById("vScrap").innerText = s.scrap;
        
        let totalQA = s.liberados + s.rechazados;
        let pctQA = totalQA > 0 ? Math.round((s.liberados / totalQA) * 100) : 0;
        document.getElementById("vQA").innerText = pctQA + "%";

        // --- GRÁFICA TENDENCIA (LÍNEAS) ---
        const fechas = [...new Set([...Object.keys(s.ingresosPorDia), ...Object.keys(s.produccionPorDia)])].sort();
        new Chart(document.getElementById('chartTendencia'), {
            type: 'line',
            data: {
                labels: fechas,
                datasets: [
                    { label: 'Entradas', data: fechas.map(f => s.ingresosPorDia[f] || 0), borderColor: '#38bdf8', tension: 0.3, fill: false },
                    { label: 'Producción', data: fechas.map(f => s.produccionPorDia[f] || 0), borderColor: '#10b981', tension: 0.3, fill: false }
                ]
            },
            options: { scales: { y: { beginAtZero: true, grid: { color: '#334155' } } }, plugins: { legend: { labels: { color: '#fff' } } } }
        });

        // --- GRÁFICA IDC (BARRAS HORIZONTALES) ---
        const idcKeys = Object.keys(s.porIDC).sort((a,b) => s.porIDC[b] - s.porIDC[a]).slice(0, 5);
        new Chart(document.getElementById('chartIDC'), {
            type: 'bar',
            data: {
                labels: idcKeys,
                datasets: [{ label: 'Piezas Enviadas', data: idcKeys.map(k => s.porIDC[k]), backgroundColor: '#f59e0b' }]
            },
            options: { indexAxis: 'y', plugins: { legend: { display: false } } }
        });

        // --- GRÁFICA TÉCNICOS ---
        new Chart(document.getElementById('chartTecnicos'), {
            type: 'bar',
            data: {
                labels: Object.keys(s.porTecnico),
                datasets: [{ label: 'Reparados', data: Object.values(s.porTecnico), backgroundColor: '#38bdf8' }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // --- GRÁFICA MARCAS ---
        new Chart(document.getElementById('chartMarcas'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(s.porMarca),
                datasets: [{ data: Object.values(s.porMarca), backgroundColor: ['#38bdf8', '#f59e0b', '#8b5cf6', '#10b981', '#ef4444'] }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
        });

        document.getElementById("espera").style.display = "none";
        document.getElementById("contenido").style.display = "block";
        document.getElementById("fechaReloj").innerText = "Sincronizado: " + new Date().toLocaleTimeString();

    } catch (e) {
        console.error(e);
        document.getElementById("espera").innerText = "Error al cargar datos.";
    }
}

cargarData();
</script>
</body>
</html>
